<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý kho | Admin Bán Lẩu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background-color: rgb(139, 133, 133); }
    .sidebar { background-color: #212529; }
    .nav-link.active {
      background-color: #f8b400;
      color: #212529 !important;
      font-weight: bold;
      border-radius: 6px;
    }
    .nav-link:hover {
      background-color: #ffc107;
      color: #212529 !important;
    }
    form {
      background-color: #ffc107;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <nav class="sidebar text-white p-3 vh-100">
      <h4 class="text-center mb-4">🍲 Lẩu Ngon Admin</h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/feane-1.0.0/index.html" class="nav-link text-white"><i class="fa fa-home me-2"></i> Trang chủ</a></li>
        <li class="nav-item"><a href="admin-dashborad.html" class="nav-link text-white"><i class="fa fa-chart-line me-2"></i> Tổng quan</a></li>
        <li class="nav-item"><a href="food.html" class="nav-link text-white"><i class="fa fa-bowl-food me-2"></i> Món ăn</a></li>
        <li class="nav-item"><a href="order.html" class="nav-link text-white"><i class="fa fa-box me-2"></i> Đơn hàng</a></li>
        <li class="nav-item"><a href="user.html" class="nav-link text-white"><i class="fa fa-users me-2"></i> Khách hàng</a></li>
        <li class="nav-item"><a href="charst.html" class="nav-link text-white"><i class="fa fa-chart-pie me-2"></i> Thống kê</a></li>
        <li class="nav-item"><a href="inventory.html" class="nav-link active text-white"><i class="fa fa-boxes-stacked me-2"></i> Quản lý kho</a></li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="flex-grow-1 p-4">
      <h2 class="text-center fw-bold mb-4">Quản lý kho hàng</h2>

      <!-- Bảng dữ liệu -->
      <table class="table table-bordered text-center align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Tên nguyên liệu</th>
            <th>Số lượng</th>
            <th>Đơn vị</th>
            <th>Ngày nhập</th>
          </tr>
        </thead>
        <tbody id="inventoryTable">
          <!-- Dữ liệu hiển thị từ JS -->
        </tbody>
      </table>

      <!-- Form thêm/sửa/xóa -->
      <div class="container mt-4">
        <form id="inventoryForm">
          <h4 class="mb-3"><i class="fa fa-box me-2"></i>Thêm / Sửa / Xóa nguyên liệu</h4>

          <div class="mb-3">
            <label class="form-label"><i class="fa fa-id-card me-2"></i> ID nguyên liệu</label>
            <input type="text" id="id" class="form-control" placeholder="Nhập ID nguyên liệu">
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fa fa-apple-whole me-2"></i> Tên nguyên liệu</label>
            <input type="text" id="name" class="form-control" placeholder="Nhập tên nguyên liệu">
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fa fa-scale-balanced me-2"></i> Số lượng</label>
            <input type="number" id="quantity" class="form-control" placeholder="Nhập số lượng">
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fa fa-weight-scale me-2"></i> Đơn vị</label>
            <input type="text" id="unit" class="form-control" placeholder="VD: kg, gói, chai,...">
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fa fa-calendar me-2"></i> Ngày nhập</label>
            <input type="date" id="date" class="form-control">
          </div>

          <button type="button" class="btn btn-success" onclick="addItem()"><i class="fa fa-plus me-1"></i> Thêm</button>
          <button type="button" class="btn btn-secondary" onclick="editItem()"><i class="fa fa-pen me-1"></i> Sửa</button>
          <button type="button" class="btn btn-danger" onclick="deleteItem()"><i class="fa fa-trash me-1"></i> Xóa</button>
        </form>
      </div>
    </main>
  </div>

  <script src="inventory.js"></script>
</body>
</html>
