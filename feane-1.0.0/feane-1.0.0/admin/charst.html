<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thống kê | Admin Bán Lẩu</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        background-color: rgb(139, 133, 133);
      }
      .sidebar {
        background-color: #212529;
      }
      .nav-link.active {
        background-color: #f8b400;
        color: #212529 !important;
        font-weight: bold;
        border-radius: 6px;
      }
      .nav-link:hover {
        background-color: #ffc107;
        color: #212529 !important;
      }
      main {
        background-color: #f8f9fa;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
      .card {
        border: none;
        border-radius: 16px;
        padding: 25px;
        background-color: #fff;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      }
      canvas {
        background-color: #fff;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        width: 100% !important;
        height: 400px !important;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <!-- Sidebar -->
      <nav class="sidebar text-white p-3 vh-100">
        <h4 class="text-center mb-4">🍲 Lẩu Ngon Admin</h4>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a href="/feane-1.0.0/index.html" class="nav-link text-white"
              ><i class="fa fa-home me-2"></i> Trang chủ</a
            >
          </li>
          <li class="nav-item">
            <a href="admin-dashborad.html" class="nav-link text-white"
              ><i class="fa fa-chart-line me-2"></i> Tổng quan</a
            >
          </li>
          <li class="nav-item">
            <a href="food.html" class="nav-link text-white"
              ><i class="fa fa-bowl-food me-2"></i> Món ăn</a
            >
          </li>
          <li class="nav-item">
            <a href="order.html" class="nav-link text-white"
              ><i class="fa fa-box me-2"></i> Đơn hàng</a
            >
          </li>
          <li class="nav-item">
            <a href="user.html" class="nav-link text-white"
              ><i class="fa fa-users me-2"></i> Khách hàng</a
            >
          </li>
          <li class="nav-item">
            <a href="charst.html" class="nav-link active text-white"
              ><i class="fa fa-chart-pie me-2"></i> Thống kê</a
            >
          </li>
          <li class="nav-item">
            <a href="inventory.html" class="nav-link text-white"
              ><i class="fa fa-boxes-stacked me-2"></i> Quản lý kho</a
            >
          </li>
        </ul>
      </nav>

      <!-- Main content -->
      <main class="flex-grow-1 p-4">
        <h2 class="fw-bold text-center mb-5 text-dark">Thống kê hệ thống</h2>

        <div class="row g-5 justify-content-center">
          <div class="col-lg-6 col-md-12">
            <div class="card shadow-lg">
              <h5 class="fw-bold mb-3 text-success">
                <i class="fa fa-chart-line me-2"></i>Doanh thu theo tháng
              </h5>
              <canvas id="chartDoanhThu"></canvas>
            </div>
          </div>

          <div class="col-lg-6 col-md-12">
            <div class="card shadow-lg">
              <h5 class="fw-bold mb-3 text-danger">
                <i class="fa fa-utensils me-2"></i>Đơn hàng theo loại món
              </h5>
              <canvas id="chartDonHang"></canvas>
            </div>
          </div>

          <!-- Biểu đồ thêm -->
          <div class="col-lg-8">
            <div class="card shadow-lg mt-4">
              <h5 class="fw-bold mb-3 text-primary">
                <i class="fa fa-user me-2"></i>Khách hàng mới theo tháng
              </h5>
              <canvas id="chartKhachHang"></canvas>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS Biểu đồ -->
    <script>
      // === Doanh thu theo tháng ===
      new Chart(document.getElementById("chartDoanhThu"), {
        type: "bar",
        data: {
          labels: ["Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10"],
          datasets: [
            {
              label: "Doanh thu (triệu VNĐ)",
              data: [12, 19, 8, 15, 23],
              backgroundColor: "rgba(255, 193, 7, 0.8)",
              borderRadius: 8,
            },
          ],
        },
        options: {
          scales: { y: { beginAtZero: true } },
          plugins: {
            legend: { display: false },
          },
        },
      });

      // === Đơn hàng theo loại món ===
      new Chart(document.getElementById("chartDonHang"), {
        type: "pie",
        data: {
          labels: ["Lẩu cua đồng", "Lẩu Bò", "Lẩu Hải Sản"],
          datasets: [
            {
              data: [35, 25, 20],
              backgroundColor: ["#f87171", "#facc15", "#4ade80"],
              hoverOffset: 10,
            },
          ],
        },
        options: {
          plugins: {
            legend: { position: "bottom" },
          },
        },
      });

      // === Khách hàng mới theo tháng ===
      new Chart(document.getElementById("chartKhachHang"), {
        type: "line",
        data: {
          labels: ["Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10"],
          datasets: [
            {
              label: "Khách hàng mới",
              data: [15, 30, 22, 40, 55],
              fill: true,
              backgroundColor: "rgba(59, 130, 246, 0.2)",
              borderColor: "#3b82f6",
              tension: 0.3,
            },
          ],
        },
        options: {
          scales: { y: { beginAtZero: true } },
          plugins: {
            legend: { position: "top" },
          },
        },
      });
    </script>
  </body>
</html>
