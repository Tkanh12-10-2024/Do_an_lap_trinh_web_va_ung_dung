  <!-- CART CONTENT -->
  <section class="cart-page"  >
    <div class="cart-container" style="background-color: rgba(207, 196, 179, 0.9); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 800px; 
            margin: auto;">
      <div class="cart-header">
        <h3>Giỏ Hàng Của Bạn</h3>
      </div>

      <div id="cartList" class="cart-list">
        <!-- JS sẽ chèn sản phẩm tại đây -->
      </div>

      <div class="cart-summary">
        <p>Tạm tính: <span id="subtotal">0 ₫</span></p>
        <p>Phí vận chuyển: <span id="shipping">0 ₫</span></p>
        <p style="font-size:18px;">Tổng cộng: <span id="total">0 ₫</span></p>
        <button id="clearBtn" class="btn btn-outline-danger">Xóa tất cả</button>
        <button id="checkoutBtn" class="checkout-btn mt-2">Mua hàng</button>
      </div>
    </div>
  </section>

  <script>
  const STORAGE_KEY = 'demo_cart_v1';
  function loadCart() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  }
  function saveCart(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
  }

  // Nếu localStorage trống → thêm sản phẩm mẫu
  function initDemoCart() {
    let cart = loadCart();
    if (cart.length === 0) {
      cart = [
        { id: 'p1', title: 'Lẩu Hải Sản', price: 250000, qty: 1, image: 'images/f2.png' },
        { id: 'p2', title: 'Lẩu Bò', price: 250000, qty: 2, image: 'images/f3.png' },
        { id: 'p3', title: 'Lẩu Cua Đồng', price: 200000, qty: 1, image: 'images/f1.png' }
      ];
      saveCart(cart);
    }
  }

  const cartListEl = document.getElementById('cartList');
  const subtotalEl = document.getElementById('subtotal');
  const shippingEl = document.getElementById('shipping');
  const totalEl = document.getElementById('total');
  const clearBtn = document.getElementById('clearBtn');
  const checkoutBtn = document.getElementById('checkoutBtn');

  let cart = [];

  function formatVND(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " ₫";
  }

  // 🟩 Cập nhật hàm renderCart()
  function renderCart() {
    cart = loadCart();
    cartListEl.innerHTML = '';
    if (cart.length === 0) {
      cartListEl.innerHTML = '<p class="text-muted text-center">Giỏ hàng trống.</p>';
    } else {
      cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
  <img src="${item.image}" alt="${item.title}">
  <div class="flex-fill">
    <h6>${item.title}</h6>
    <small class="text-muted">${formatVND(item.price)}</small>
    <p class="text-muted mt-1">Số lượng: <strong>${item.qty}</strong></p>
  </div>
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-sm btn-outline-secondary" onclick="changeQty('${item.id}', -1)">–</button>
    <span>${item.qty}</span>
    <button class="btn btn-sm btn-outline-secondary" onclick="changeQty('${item.id}', 1)">+</button>
  </div>
  <strong>${formatVND(item.qty * item.price)}</strong>
`;


        cartListEl.appendChild(div);
      });
    }

    let subtotal = cart.reduce((sum, item) => sum + item.qty * item.price, 0);
    let shipping = subtotal >= 500000 ? 0 : (subtotal > 0 ? 30000 : 0);
    subtotalEl.textContent = formatVND(subtotal);
    shippingEl.textContent = formatVND(shipping);
    totalEl.textContent = formatVND(subtotal + shipping);
  }

  // 🟦 Hàm thay đổi số lượng
  function changeQty(id, delta) {
    let cart = loadCart();
    const index = cart.findIndex(item => item.id === id);
    if (index !== -1) {
      cart[index].qty += delta;
      if (cart[index].qty <= 0) {
        if (confirm(`Bạn có muốn xóa ${cart[index].title} khỏi giỏ hàng không?`)) {
          cart.splice(index, 1);
        } else {
          cart[index].qty = 1;
        }
      }
      saveCart(cart);
      renderCart();
    }
  }

  clearBtn.onclick = () => {
    if (cart.length === 0) return alert('Giỏ hàng đang rỗng.');
    if (confirm('Bạn có chắc muốn xóa toàn bộ giỏ hàng?')) {
      cart = [];
      saveCart(cart);
      renderCart();
    }
  };

  checkoutBtn.onclick = () => {
    if (cart.length === 0) return alert('Giỏ hàng trống!');
    alert('Đặt hàng thành công! (Demo)');
    cart = [];
    saveCart(cart);
    renderCart();
  };

  // Khởi tạo demo
  initDemoCart();
  renderCart();
</script>
