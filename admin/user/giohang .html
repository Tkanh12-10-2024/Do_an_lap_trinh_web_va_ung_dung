  <section class="cart-page layout_padding">
    <div class="container">
    <div class="cart-container" style="background-color: rgba(228, 193, 142, 0.9); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 800px; 
            margin: auto;">
      <div class="cart-header">
        <h3>Giỏ Hàng Của Bạn</h3>
        <button id="clearBtn" class="btn btn-outline-danger">Xóa tất cả</button>
      </div>

      <div id="cartList" class="cart-list">
        <!-- JS sẽ chèn sản phẩm tại đây -->
      </div>

      <div class="cart-summary">
        <p>Tạm tính: <span id="subtotal">0 ₫</span></p>
        <p>Phí vận chuyển: <span id="shipping">0 ₫</span></p>
        <p style="font-size:18px;">Tổng cộng: <span id="total">0 ₫</span></p>
        <button id="checkoutBtn" class="checkout-btn mt-2">Mua hàng</button>
      </div>
    </div>
    </div>
  </section>

 <script>
  const STORAGE_KEY = 'demo_cart_v1';

  function loadCart() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  }

  function saveCart(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
  }

  // ✅ Tạo sẵn sản phẩm mẫu nếu chưa có
  function initDemoCart() {
    let cart = loadCart();
    if (cart.length === 0) {
      cart = [
        { id: 'p1', title: 'Lẩu Hải Sản', price: 259000, qty: 1, image: 'images/f2.png' },
        { id: 'p2', title: 'Lẩu Bò', price: 289000, qty: 2, image: 'images/f3.png' },
        { id: 'p3', title: 'Lẩu Cua Đồng', price: 239000, qty: 1, image: 'images/f1.png' }
      ];
      saveCart(cart);
    }
  }

  const cartListEl = document.getElementById('cartList');
  const subtotalEl = document.getElementById('subtotal');
  const shippingEl = document.getElementById('shipping');
  const totalEl = document.getElementById('total');
  const clearBtn = document.getElementById('clearBtn');
  const checkoutBtn = document.getElementById('checkoutBtn');

  function formatVND(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " ₫";
  }

  // ✅ Hiển thị giỏ hàng
  function renderCart() {
    const cart = loadCart();
    cartListEl.innerHTML = '';

    if (cart.length === 0) {
      cartListEl.innerHTML = '<p class="text-muted text-center">Giỏ hàng trống.</p>';
    } else {
      cart.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <div class="cart-info">
            <img src="${item.image}" alt="${item.title}">
            <div>
              <h6>${item.title}</h6>
              <small>${formatVND(item.price)}</small>
            </div>
          </div>
          <div class="qty-controls">
            <button class="btn-qty" data-id="${item.id}" data-action="decrease">-</button>
            <span class="qty">${item.qty}</span>
            <button class="btn-qty" data-id="${item.id}" data-action="increase">+</button>
          </div>
          <strong>${formatVND(item.qty * item.price)}</strong>
        `;
        cartListEl.appendChild(div);
      });
    }

    let subtotal = cart.reduce((sum, item) => sum + item.qty * item.price, 0);
    let shipping = subtotal >= 500000 ? 0 : (subtotal > 0 ? 30000 : 0);
    subtotalEl.textContent = formatVND(subtotal);
    shippingEl.textContent = formatVND(shipping);
    totalEl.textContent = formatVND(subtotal + shipping);
  }

  // ✅ Nút "Xóa tất cả" – KHÔNG xóa khỏi localStorage để không mất sản phẩm demo
  clearBtn.onclick = () => {
    if (confirm('Bạn có muốn làm trống giỏ hàng không?')) {
      let cart = loadCart();
      saveCart(cart);
      renderCart();
    }
  };

  // ✅ Sự kiện tăng giảm số lượng
  cartListEl.addEventListener('click', (e) => {
    if (e.target.classList.contains('btn-qty')) {
      const id = e.target.dataset.id;
      const action = e.target.dataset.action;
      let cart = loadCart();
      const item = cart.find(p => p.id === id);
      if (!item) return;

      if (action === 'increase') item.qty++;
      else if (action === 'decrease') {
        if (item.qty > 1) item.qty--;
        else if (confirm(`Xóa ${item.title} khỏi giỏ hàng?`)) {
          cart = cart.filter(p => p.id !== id);
        }
      }

      saveCart(cart);
      renderCart();
    }
  });

  // ✅ Nút “Mua hàng” – không xóa dữ liệu demo
  checkoutBtn.onclick = () => {
    const cart = loadCart();
    if (cart.length === 0) return alert('Giỏ hàng trống!');
    alert('Đặt hàng thành công! (dữ liệu demo vẫn được giữ nguyên)');
  };

  // ✅ Khởi tạo dữ liệu và hiển thị
  initDemoCart();
  renderCart();
</script>
