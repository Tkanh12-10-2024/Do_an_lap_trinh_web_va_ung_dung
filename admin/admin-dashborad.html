<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Trang Tổng Quan | Admin Bán Lẩu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .sidebar { background-color: #212529; }
    .nav-link.active {
      background-color: #f8b400;
      color: #212529 !important;
      font-weight: bold;
      border-radius: 6px;
    }
    .nav-link:hover {
      background-color: #ffc107;
      color: #212529 !important;
    }
  </style>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: rgb(139, 133, 133) !important">
  <div class="d-flex">
    <!-- Sidebar -->
      <nav class="sidebar text-white p-3 vh-100">
      <h4 class="text-center mb-4">🍲 Lẩu Ngon Admin</h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a href="admin-dashborad.html" class="nav-link active text-white"><i class="fa fa-chart-line me-2"></i> Tổng quan</a></li>
        <li class="nav-item"><a href="food.html" class="nav-link text-white"><i class="fa fa-bowl-food me-2"></i> Món ăn</a></li>
        <li class="nav-item"><a href="order.html" class="nav-link text-white"><i class="fa fa-box me-2"></i> Đơn hàng</a></li>
        <li class="nav-item"><a href="user.html" class="nav-link text-white"><i class="fa fa-users me-2"></i> Khách hàng</a></li>
        <li class="nav-item"><a href="charst.html" class="nav-link text-white"><i class="fa fa-chart-pie me-2"></i> Thống kê</a></li>
        <li class="nav-item"><a href="import_invoice.html" class="nav-link text-white"><i class="fa fa-file-invoice me-2"></i> Phiếu nhập</a></li>
        <li class="nav-item"><a href="inventory.html" class="nav-link text-white"><i class="fa fa-boxes-stacked me-2"></i> Quản lý kho</a></li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="flex-grow-1 p-4 bg-light" style="background-color: rgb(139, 133, 133) !important ;">
      <h2 class="fw-bold mb-4" >Bảng điều khiển</h2>

      <!-- Thống kê nhanh -->
      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card shadow-sm stat-card">
            <div class="card-body d-flex align-items-center">
              <i class="fa fa-bowl-food text-danger fs-2 me-3"></i>
              <div>
                <h5 class="mb-0">9</h5>
                <small class="text-muted">Món ăn</small>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm stat-card">
            <div class="card-body d-flex align-items-center">
              <i class="fa fa-box text-warning fs-2 me-3"></i>
              <div>
                <h5 class="mb-0">127</h5>
                <small class="text-muted">Đơn hàng</small>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm stat-card">
            <div class="card-body d-flex align-items-center">
              <i class="fa fa-users text-primary fs-2 me-3"></i>
              <div>
                <h5 class="mb-0">68</h5>
                <small class="text-muted">Khách hàng</small>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm stat-card">
            <div class="card-body d-flex align-items-center">
              <i class="fa fa-dollar-sign text-success fs-2 me-3"></i>
              <div>
                <h5 class="mb-0">89.5 triệu VNĐ</h5>
                <small class="text-muted">Doanh thu</small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Biểu đồ -->
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">
          Biểu đồ doanh thu (giả lập)
        </div>
        <div class="card-body">
          <canvas id="chartDoanhThu" height="100"></canvas>
        </div>
      </div>
    </main>
  </div>

  

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('chartDoanhThu');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Tháng 6', 'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10'],
        datasets: [{
          label: 'Doanh thu (triệu đồng)',
          data: [12, 19, 8, 15, 23],
          backgroundColor: 'rgb(247, 192, 41)',
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        scales: { y: { beginAtZero: true } }
      }
    });
  </script>
</body>
</html>
